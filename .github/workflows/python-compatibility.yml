# Python Compatibility Matrix Testing for Fragrance Rater
# Tests the project across multiple Python versions and operating systems.
#
# This is a thin caller to the org-level reusable workflow.
name: Python Compatibility

on:
  push:
    branches: [main, master]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/**/*.py'
      - 'tests/**/*.py'
      - 'pyproject.toml'
      - 'uv.lock'
  schedule:
    # Weekly compatibility check on Sundays at 6 AM UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: python-compat-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  compatibility:
    name: Python Compatibility Matrix
    uses: ByronWilliamsCPA/.github/.github/workflows/python-compatibility.yml@62bfd795d1273b4819a3f66aa9cef0b917acb830  # main
    with:
      python-versions: '["3.10", "3.11", "3.12", "3.13"]'
      operating-systems: '["ubuntu-latest"]'
      include-macos: true
      include-windows: true
      source-directory: 'src'
      # Drop the `-m "not slow and not integration"` clause: the inner double
      # quotes are stripped when the reusable workflow expands `test-command` via
      # GitHub Actions expression syntax, causing pytest to interpret `slow` as a
      # path argument. No tests in this repo are marked `slow` (and integration
      # tests are already excluded via --ignore), so the marker expression is a
      # no-op anyway.
      test-command: 'pytest tests/ -v --tb=short -x --ignore=tests/integration --ignore=tests/load'
      coverage-report: false
      fail-fast: false
      timeout-minutes: 30
      # The reusable workflow defaults `no-build: true`, which fails with
      # an editable-install error for this project (same fix as ci.yml).
      no-build: false
    secrets: inherit
