---
# Security Analysis Workflow
# Runs security scans including Bandit, Safety, and dependency checks.
#
# Features:
#   - Bandit static analysis for Python
#   - Safety dependency vulnerability scanning
#   - Weekly scheduled scans
name: Security Analysis

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run security scans weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write
  pull-requests: write
  actions: read

# Uses org-level reusable workflow.
# Caller job is named "Security Analysis" so the reusable workflow's
# final "Security Gate Validation" job surfaces as the canonical
# "Security Analysis / Security Gate Validation" check the org ruleset
# requires.
jobs:
  security:
    name: Security Analysis
    uses: ByronWilliamsCPA/.github/.github/workflows/python-security-analysis.yml@40ff5b5615e786ee0867e1b9e8f21a4735036e63  # main
    with:
      source-directory: 'src'
      python-version: '3.12'
      fail-on-high: true
      fail-on-medium: false
      run-codeql: true
      run-dependency-review: true
      run-bandit: true
      run-osv: true
      # Override reusable workflow's no-build: true default for projects
      # installed as `editable+.` (same fix pattern as ci.yml).
      no-build: false
