# Publish to PyPI - Calls Org-Level Reusable Workflow
# This is a lightweight caller workflow that invokes the organization's
# shared PyPI publishing workflow with OIDC trusted publishing.
name: Publish to PyPI

# Private repo: PyPI publishing is manual-only. The `release: published`
# auto-trigger is intentionally omitted so that GitHub Releases created by
# release.yml do not publish to PyPI. Run this workflow via workflow_dispatch
# to publish deliberately.
on:
  workflow_dispatch:
    inputs:
      test-pypi:
        description: 'Publish to Test PyPI instead of PyPI'
        type: boolean
        required: false
        default: false

jobs:
  publish:
    name: Publish Package
    uses: ByronWilliamsCPA/.github/.github/workflows/python-publish-pypi.yml@987d517d3c8e4b180f4dd15de6d9575f0df91182  # main
    with:
      python-version: '3.12'
      package-name: 'fragrance-rater'
      test-pypi: ${{ github.event.inputs.test-pypi || false }}

permissions:
  contents: read
  id-token: write  # Required for OIDC trusted publishing
