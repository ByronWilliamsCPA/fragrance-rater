# PR Validation for Fragrance Rater
#
# Emits the three check names the org ruleset requires as bare top-level
# jobs (no reusable-workflow caller prefix):
#   - PR Title Format
#   - PR Body Non-Empty
#   - Dependency & Standards Validation
#
# These mirror the jobs in ByronWilliamsCPA/.github/.github/workflows/pr-validation.yml,
# inlined here because the org's pr-validation.yml is a standalone workflow
# (not workflow_call) so consumer repos must replicate the job definitions
# locally to land the same check names on their own PRs.
name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
    branches:
      - main
      - master
      - develop

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  title-check:
    name: PR Title Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit
      - name: Validate conventional commit title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Conventional Commits: type(scope)!: description
          PATTERN='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^()]+\))?!?: .+'
          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "PR title follows Conventional Commits format."
          else
            echo "::error::PR title must follow Conventional Commits format."
            echo "::error::  Expected: type(scope): description"
            echo "::error::  Example:  feat(auth): add OAuth2 support"
            echo "::error::  Got: $PR_TITLE"
            exit 1
          fi

  body-check:
    name: PR Body Non-Empty
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit
      - name: Check PR body is non-empty
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ] || [ "$PR_BODY" = "null" ]; then
            echo "::error::PR description is empty. Please describe what this PR does."
            exit 1
          fi
          STRIPPED=$(echo "$PR_BODY" | tr -d '[:space:]')
          if [ -z "$STRIPPED" ]; then
            echo "::error::PR description contains only whitespace."
            exit 1
          fi
          echo "PR body is present."

  dependency-standards-validation:
    name: Dependency & Standards Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [title-check, body-check]
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99  # v2.19.2
        with:
          egress-policy: audit
      - name: Check dependency and standards requirements
        env:
          TITLE_RESULT: ${{ needs.title-check.result }}
          BODY_RESULT: ${{ needs.body-check.result }}
        run: |
          if [ "$TITLE_RESULT" != "success" ] || [ "$BODY_RESULT" != "success" ]; then
            echo "::error::PR validation checks failed: dependency and standards gate blocked."
            exit 1
          fi
          echo "Dependency and standards validation passed."
