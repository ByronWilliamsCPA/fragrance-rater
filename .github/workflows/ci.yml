# CI/CD Pipeline
# Runs tests, linting, type checking, and security scans.
#
# Features:
#   - Standard quality checks (tests, linting, type checking)
#   - Security scanning (Bandit, Safety)
#   - Optional SonarCloud/Codecov integration
name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main, master, develop]
  workflow_dispatch:

# Cancel in-progress runs for same PR/branch
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

# Uses org-level reusable workflow
jobs:
  ci:
    name: CI Pipeline
    uses: ByronWilliamsCPA/.github/.github/workflows/python-ci.yml@62bfd795d1273b4819a3f66aa9cef0b917acb830  # main
    with:
      python-version: '3.12'
      coverage-threshold: 80
      source-directory: 'src'
      test-directory: 'tests'
      run-integration-tests: true
      run-security-tests: true
      fail-on-llm-tags: false
      # The reusable workflow defaults `no-build: true`, which fails with
      # "Distribution can't be installed because it is marked as --no-build
      # but has no binary distribution" for projects installed as
      # `editable+.`. Override to false so uv can build the package.
      no-build: false

  # Top-level gate that emits the bare "CI Gate" check name the org
  # ruleset requires. The reusable workflow's internal "CI Gate" job
  # surfaces as "CI Pipeline / CI Gate" because of the caller-job
  # prefix; this aggregate job re-publishes the same pass/fail signal
  # under the canonical name the ruleset matches on.
  ci-gate:
    name: CI Gate
    needs: ci
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411  # v2.19.4
        with:
          egress-policy: audit
      - name: Aggregate CI result
        env:
          CI_RESULT: ${{ needs.ci.result }}
        run: |
          if [ "$CI_RESULT" != "success" ]; then
            echo "::error::CI reusable workflow did not succeed: $CI_RESULT"
            exit 1
          fi
          echo "CI Gate: all upstream checks succeeded."
